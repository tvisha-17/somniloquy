data_dir: /Users/kaho/neurotech_hackathon/somniloquy copy/data/processed/Dream EEG with emotion labels
processed_dir: data/processed/eeg_emotions
batch_size: 32
lr: 1e-3
weight_decay: 1e-4
n_epochs: 12
freeze_backbone: false
normalization_mode: per_recording
use_subject_split: true
val_fraction: 0.2
test_fraction: 0.2
random_seed: 13
num_workers: 0
device: cpu
checkpoint_dir: checkpoints/eeg_emotions
dropout: 0.3
latent_dim: 128
backbone_mode: cnn
zuna_model_name: Zyphra/ZUNA
num_classes: 3
window_size_samples: 3200
stride_size_samples: 3200
target_sfreq: 200
